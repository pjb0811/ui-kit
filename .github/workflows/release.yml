name: Release (manual backfill)

# publish.yml now creates the GitHub Release itself right after tagging, in
# the same job/token context — a tag pushed with the default GITHUB_TOKEN
# never triggers another workflow run, so a `push: tags` trigger here would
# never fire. This workflow is kept only as a manual fallback to (re)create
# a release for an existing tag, e.g. to backfill one that's missing.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to create/recreate a GitHub Release for (e.g. v2.9.7)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Get changelog entry
        id: changelog
        run: |
          VERSION=${{ github.event.inputs.tag }}
          VERSION=${VERSION#v}
          CHANGELOG_FILE="packages/ui/CHANGELOG.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            # Can't use awk's `/start/,/end/` range here: the end pattern
            # (any "## " header) also matches the start line itself, so the
            # range would close immediately and yield nothing. Skip the
            # start header explicitly and exit before printing the next one.
            # changesets writes headers as "## VERSION" with no brackets
            # (older entries in this file predate the changesets migration
            # and still use "## [VERSION] - date" — the exit pattern below
            # matches either since it only checks the "## " prefix).
            CONTENT=$(awk -v version="$VERSION" '
              $0 ~ "^## " version "$" { found=1; next }
              found && /^## / { exit }
              found { print }
            ' "$CHANGELOG_FILE")
            # %0A/%0D/%25 escaping only applied to the old, deprecated
            # `::set-output` command syntax (which the runner auto-decoded).
            # The modern $GITHUB_OUTPUT file doesn't decode that, so it was
            # writing literal "%0A" text into the release body. Use the
            # heredoc form instead, which preserves real newlines as-is.
            {
              echo "body<<EOF"
              echo "$CONTENT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          body: ${{ steps.changelog.outputs.body || format('Release {0}', github.event.inputs.tag) }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag, 'alpha') || contains(github.event.inputs.tag, 'beta') || contains(github.event.inputs.tag, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
