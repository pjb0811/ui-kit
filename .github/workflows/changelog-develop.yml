name: Changelog (develop)

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      since:
        description: '(optional) diff start commit SHA — defaults to the immediately preceding commit if left blank. Use this to recover a failed automatic run or reprocess a specific range'
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    if: "${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, '🔧 chore: update changelog') }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Update package versions and changelogs via GitHub Models
        id: github-models
        env:
          # Use a personal PAT — GITHUB_TOKEN (the bot account) doesn't get
          # the rate-limit benefit of the personal Copilot subscription, so
          # use a PAT with models: read permission stored as GH_MODELS_PAT.
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_PAT }}
          BEFORE_SHA: ${{ github.event.inputs.since || github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: node .github/scripts/update-changelog.mjs

      - name: Check for changelog changes
        id: changes
        run: |
          if git status --porcelain -- 'packages/*/CHANGELOG.md' 'packages/*/package.json' 'CHANGELOG.md' 'package.json' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changelog updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- 'packages/*/CHANGELOG.md' 'packages/*/package.json' 'CHANGELOG.md' 'package.json'
          git commit -m "🔧 chore: update changelog"

      - name: Open changelog PR
        if: steps.changes.outputs.changed == 'true'
        id: open_pr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: '🔧 chore: update changelog'
          title: '🔧 chore: update changelog'
          body: |
            Auto-generated by analyzing the changes merged into `develop` at
            ${{ github.sha }} via GitHub Models (auto-merged; see the diff for details).
          branch: 'chore/changelog-update-${{ github.run_id }}'
          base: develop
          delete-branch: true

      - name: Merge changelog PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.open_pr.outputs.pull-request-number }} --squash --delete-branch
