name: Changelog (develop)

on:
  push:
    branches: [develop]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  changelog:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: update changelog') }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Update package versions and changelogs via GitHub Models
        id: github-models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: node .github/scripts/update-changelog.mjs

      - name: Check for changelog changes
        id: changes
        run: |
          if git status --porcelain -- 'packages/*/CHANGELOG.md' 'packages/*/package.json' 'CHANGELOG.md' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changelog updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- 'packages/*/CHANGELOG.md' 'packages/*/package.json' 'CHANGELOG.md'
          git commit -m "chore: update changelog (automated)"

      - name: Open changelog PR
        if: steps.changes.outputs.changed == 'true'
        id: open_pr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update changelog (automated)'
          title: 'chore: update changelog (automated)'
          body: |
            Automatically generated from the diff merged into `develop` at
            ${{ github.sha }} via GitHub Models. Auto-merged — see the diff
            for what changed.
          branch: 'chore/changelog-update-${{ github.run_id }}'
          base: develop
          delete-branch: true

      - name: Merge changelog PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.open_pr.outputs.pull-request-number }} --squash --delete-branch
