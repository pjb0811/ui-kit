name: Changelog (develop)

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      since:
        description: '(선택) diff 시작 커밋 SHA — 비우면 바로 이전 커밋 기준. 실패한 자동 실행을 복구하거나 특정 구간을 다시 처리할 때 사용'
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    if: "${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, '🔧 chore: changelog 자동 업데이트') }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Update package versions and changelogs via GitHub Models
        id: github-models
        env:
          # 개인 PAT 사용 — GITHUB_TOKEN(봇 계정)은 개인 Copilot 구독의
          # rate limit 혜택을 받지 못하므로, models: read 권한의 PAT를
          # GH_MODELS_PAT 시크릿으로 등록해서 사용한다.
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_PAT }}
          BEFORE_SHA: ${{ github.event.inputs.since || github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: node .github/scripts/update-changelog.mjs

      - name: Check for changelog changes
        id: changes
        run: |
          if git status --porcelain -- 'packages/*/CHANGELOG.md' 'packages/*/package.json' 'CHANGELOG.md' 'package.json' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changelog updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- 'packages/*/CHANGELOG.md' 'packages/*/package.json' 'CHANGELOG.md' 'package.json'
          git commit -m "🔧 chore: changelog 자동 업데이트"

      - name: Open changelog PR
        if: steps.changes.outputs.changed == 'true'
        id: open_pr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: '🔧 chore: changelog 자동 업데이트'
          title: '🔧 chore: changelog 자동 업데이트'
          body: |
            `develop`에 머지된 ${{ github.sha }} 변경사항을 GitHub Models로
            분석해 자동 생성 (자동 머지됨, 상세 내용은 diff 참고).
          branch: 'chore/changelog-update-${{ github.run_id }}'
          base: develop
          delete-branch: true

      - name: Merge changelog PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.open_pr.outputs.pull-request-number }} --squash --delete-branch
