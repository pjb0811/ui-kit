name: Publish

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # v6+ is required for npm's OIDC "Trusted Publishing" used below.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # packages/ui's version is untagged only right after a develop -> main
      # merge has just landed a new version (bumped earlier by the Version
      # Packages PR that version-develop.yml/changesets opened on develop)
      # — that's the signal to actually build/publish/tag. Otherwise this
      # push is an ordinary main update with nothing new to release.
      - name: Check if current version is already tagged
        id: tag_check
        run: |
          VERSION=$(node -p "require('./packages/ui/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.tag_check.outputs.already_tagged == 'false'
        run: pnpm install

      - name: Build
        if: steps.tag_check.outputs.already_tagged == 'false'
        run: pnpm exec turbo run build --filter=@repo/ui

      # Uses npm's OIDC "Trusted Publishing" — no NPM_TOKEN needed. pnpm
      # publish doesn't support this yet, so publish-ui shells out to npm
      # directly; the package itself is still built via pnpm above.
      - name: Publish to npm
        if: steps.tag_check.outputs.already_tagged == 'false'
        run: pnpm run publish-ui

      - name: Tag release
        if: steps.tag_check.outputs.already_tagged == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.tag_check.outputs.version }}"
          git push origin "v${{ steps.tag_check.outputs.version }}"

      # release.yml used to do this on tag push, but a tag pushed with the
      # default GITHUB_TOKEN (as above) never triggers another workflow run
      # — GitHub blocks that to prevent recursive runs — so it never fired.
      # Doing it here, in the same job/token context, sidesteps that
      # entirely instead of needing a separate PAT.
      - name: Get changelog entry
        if: steps.tag_check.outputs.already_tagged == 'false'
        id: changelog
        env:
          # Reused for the release-note polishing step below — a personal
          # PAT with models:read (GITHUB_TOKEN doesn't get the free-tier
          # rate-limit benefit of the personal subscription).
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_PAT }}
        run: |
          VERSION=${{ steps.tag_check.outputs.version }}
          CHANGELOG_FILE="packages/ui/CHANGELOG.md"
          RAW=""
          if [ -f "$CHANGELOG_FILE" ]; then
            # Can't use awk's `/start/,/end/` range here: the end pattern
            # (any "## " header) also matches the start line itself, so the
            # range would close immediately and yield nothing. Skip the
            # start header explicitly and exit before printing the next one.
            # changesets writes headers as "## VERSION" with no brackets
            # (older entries in this file predate the changesets migration
            # and still use "## [VERSION] - date" — the exit pattern below
            # matches either since it only checks the "## " prefix).
            RAW=$(awk -v version="$VERSION" '
              $0 ~ "^## " version "$" { found=1; next }
              found && /^## / { exit }
              found { print }
            ' "$CHANGELOG_FILE")
          fi

          CONTENT="$RAW"
          if [ -n "$RAW" ]; then
            # Best-effort: polish the raw changelog bullets into flowing
            # release notes via GitHub Models. Never blocks the release —
            # fall back to the raw changelog text on any failure.
            if POLISHED=$(echo "$RAW" | PACKAGE_NAME="@repo/ui" VERSION="$VERSION" node .github/scripts/polish-release-notes.mjs); then
              CONTENT="$POLISHED"
            else
              echo "::warning::Release-note polishing failed, falling back to raw changelog"
            fi
          fi

          # %0A/%0D/%25 escaping only applied to the old, deprecated
          # `::set-output` command syntax (which the runner auto-decoded).
          # The modern $GITHUB_OUTPUT file doesn't decode that, so it was
          # writing literal "%0A" text into the release body. Use the
          # heredoc form instead, which preserves real newlines as-is.
          {
            echo "body<<EOF"
            echo "$CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.already_tagged == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.tag_check.outputs.version }}
          body: ${{ steps.changelog.outputs.body || format('Release {0}', steps.tag_check.outputs.version) }}
          draft: false
          prerelease: ${{ contains(steps.tag_check.outputs.version, 'alpha') || contains(steps.tag_check.outputs.version, 'beta') || contains(steps.tag_check.outputs.version, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
